<!DOCTYPE html>
<html>
<head>
    <title></title>
</head>
<body>
    
{% extends "base.html" %}
{% block content %}

<div class="product-grid">
    {% for product in products %}
        <a href="/product/{{ product.id }}" class="product-link">
        <div class="card">
            <img src="{{ product.image }}">
            <h3>{{ product.name }}</h3>
            <p>₹{{ product.price }}</p>
        </div>
        </a>

    {% endfor %}
</div>

{% endblock %}

</body>
</html>

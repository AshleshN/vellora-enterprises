<!DOCTYPE html>
<html>
<head>
    <title></title>
</head>
<body>

{% extends "base.html" %}
{% block content %}

<div class="dashboard-card tilt">
    <h2>Account Settings</h2>

    <form method="POST">
        <label>Full Name</label>
        <input type="text" name="name" value="{{ current_user.name }}">

        <label>Contact Number</label>
        <input type="text" name="contact" value="{{ current_user.contact }}">

        <label>Theme</label>
        <select name="theme">
            <option value="dark" {% if current_user.theme == "dark" %}selected{% endif %}>Dark</option>
            <option value="light" {% if current_user.theme == "light" %}selected{% endif %}>Light</option>
        </select>

        <button type="submit">Save Changes</button>
    </form>
</div>

{% endblock %}

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Top Tier 3D Platform</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <script defer src="{{ url_for('static', filename='js/ui.js') }}"></script>
</head>
<body class="{{ current_user.theme if current_user.is_authenticated else 'dark' }}">

<div class="bg-animation"></div>

<nav class="navbar">
    <h1>
    <div class="logo">VELLORA</div>
    </h1>
    <div class="nav-links">
        <a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a>
        <a href="/shopping" class="{% if request.path == '/shopping' %}active{% endif %}">Shopping</a>
        <a href="/premium" class="{% if request.path == '/premium' %}active{% endif %}">Premium</a>
        <a href="/cart" class="{% if request.path == '/cart' %}active{% endif %}">Cart</a>
        {% if current_user.is_authenticated and current_user.is_admin %}
        <a href="/admin">Admin</a>
        {% endif %}
        <a href="/settings" class="{% if request.path == '/sttings' %}active{% endif %}">Settings</a>
        {% if current_user.is_authenticated %}
            <a href="/logout">Logout</a>
        {% else %}
            <a href="/login">Login</a>
            <a href="/signup">Signup</a>
        {% endif %}
    </div>
</nav>

<div class="page">
    {% block content %}{% endblock %}
</div>

</body>
</html>
